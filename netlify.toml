# Netlify configuration for the Lumen onboarding suite.
#
# Layout:
#   public/                     static frontends (sales, chat, dashboard)
#   netlify/functions/          server-side proxy + (later) session store
#
# The chat frontend calls /.netlify/functions/chat on the SAME origin, so no
# CORS setup is needed. Set ANTHROPIC_API_KEY in Netlify's environment
# variables (Site settings > Environment variables), never in the repo.

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Give the synchronous chat proxy room to finish a reply. The proxy is
# non-streaming, so the whole model reply must generate inside this window; the
# default (~10s) killed heavy turns (the final summary/handoff) mid-generation
# and the client saw "That didn't go through". Pinned here so it does not depend
# on the manual Netlify UI toggle. 26s is the platform max; the code self-aborts
# upstream at 24s (chat.js) to return a clean error just inside it. On a plan
# that caps below 26s this value is clamped/ignored, which is why the prompt-side
# token cuts are the primary fix, not this line.
[functions]
  timeout = 26

# Friendly paths (optional): /chat, /sales, /dashboard instead of *.html
[[redirects]]
  from = "/chat"
  to = "/chat.html"
  status = 200

[[redirects]]
  from = "/sales"
  to = "/sales.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200
