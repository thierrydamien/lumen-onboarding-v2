<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="robots" content="noindex, nofollow"/>
<link rel="icon" href="/lumen-mark.png"/>
<title>Lumen Onboarding — Proserv Dashboard</title>
<!-- INTERNAL PAGE: session reads require DASHBOARD_TOKEN, but the page itself is
     ungated. Gate behind Netlify password protection or Identity before production.
     noindex is a hint to crawlers, not access control. -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"/>
<style>
  :root {
    /* Mirror the client chat (Inter + Lumen purple + waveform mark) so the
       dashboard, sales page and chat read as one product. --teal/--muted/
       --cherry/--mint are kept (the script references them by name in inline
       styles). Design tokens match the T object in lumen.jsx. */
    --purple:#7C3AED; --purple-soft:#EDE7FB;
    --teal:#012B3A; --ink:#0f172a; --cherry:#e11d48; --mint:#DFFFDE;
    --border:#e6e8ee; --muted:#64748b; --bg:#f6f5fb;
    --radius-sm:6px; --radius-md:10px; --radius-lg:16px;
    --shadow-raise:0 1px 3px rgba(15,23,42,.06); --shadow-float:0 8px 24px rgba(0,0,0,.12); --shadow-modal:0 16px 48px rgba(0,0,0,.2);
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:'Inter',Arial,Helvetica,sans-serif; color:var(--ink); background:var(--bg); }

  /* Branded header (matches sales + chat). */
  .bar { background:#fff; border-bottom:1px solid var(--border); padding:12px 24px; display:flex; align-items:center; gap:12px; }
  .mark { width:34px; height:34px; border-radius:50%; background:var(--purple-soft); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .mark img { width:20px; height:20px; display:block; }
  .brand b { font-size:15px; color:var(--purple); letter-spacing:-.01em; }
  .brand .by { font-size:10px; color:var(--muted); }
  .barlabel { font-size:12px; color:var(--muted); border-left:1px solid var(--border); padding-left:12px; }
  .baractions { margin-left:auto; display:flex; align-items:center; gap:12px; }
  .count { font-size:13px; color:var(--muted); }
  .updated { font-size:11px; color:var(--muted); }
  .refresh { background:var(--purple-soft); color:var(--purple); border:none; border-radius:8px; padding:8px 15px; cursor:pointer; font-family:inherit; font-size:12px; font-weight:700; }
  .refresh:disabled { opacity:.6; cursor:default; }

  .wrap { max-width:980px; margin:26px auto; padding:0 20px; }
  h1 { font-size:20px; margin:0 0 16px; color:var(--teal); letter-spacing:-.01em; }
  table { width:100%; border-collapse:collapse; background:#fff; border:1px solid var(--border); border-radius:14px; overflow:hidden; box-shadow:var(--shadow-raise); }
  th, td { text-align:left; padding:12px 14px; font-size:13px; border-bottom:1px solid var(--border); }
  th { background:#faf9fe; font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); font-weight:700; }
  tr:last-child td { border-bottom:none; }
  tr.row { cursor:pointer; }
  tr.row:hover { background:#faf9fe; }
  .pill { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; }
  .pill.completed { background:var(--mint); color:#0a5c2a; }
  .pill.other { background:#eef1f5; color:var(--muted); }
  .muted { color:var(--muted); }
  .empty, .err { text-align:center; padding:40px; color:var(--muted); font-size:14px; }
  .err { color:var(--cherry); }
  .kpis { display:grid; grid-template-columns:repeat(auto-fill, minmax(170px,1fr)); gap:12px; margin-bottom:18px; }
  .kpi { background:#fff; border:1px solid var(--border); border-radius:14px; padding:15px 16px; box-shadow:var(--shadow-raise); }
  .kpi .v { font-size:23px; font-weight:800; color:var(--teal); font-variant-numeric:tabular-nums; letter-spacing:-.02em; }
  .kpi .l { font-size:10.5px; color:var(--muted); margin-top:4px; line-height:1.4; }
  td.num { text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap; }
  th.num { text-align:right; }
  .sub2 { font-size:10.5px; color:var(--muted); }
  .chip { display:inline-block; margin-left:6px; padding:1px 8px; border-radius:20px; font-size:9.5px; font-weight:700; background:var(--purple-soft); color:var(--purple); vertical-align:middle; }
  .rep a { color:#0b6b3a; font-weight:700; text-decoration:underline; font-size:12px; }
  .rep .ho { font-size:11px; color:var(--muted); }
  /* Standalone "handoff ready" (no Sheet yet): the row opens the detail, so make
     it read as an action, not a dead label. */
  .rep .hoff { color:var(--purple); font-weight:700; text-decoration:underline; font-size:12px; cursor:pointer; }
  tr.row:hover .rep .hoff { text-decoration:none; }
  .rep .none { color:var(--muted); }
  .note { font-size:11px; color:var(--muted); margin:14px 2px 0; line-height:1.5; }
  .filters { display:flex; gap:14px; align-items:center; margin-bottom:14px; flex-wrap:wrap; }
  .filters label { font-size:12px; color:var(--muted); display:flex; align-items:center; gap:6px; }
  .filters select { font-family:inherit; font-size:13px; padding:7px 10px; border:1px solid var(--border); border-radius:9px; background:#fff; color:var(--ink); cursor:pointer; outline:none; }
  .filters input[type="search"] { font-family:inherit; font-size:13px; padding:8px 12px; border:1px solid var(--border); border-radius:9px; color:var(--ink); min-width:240px; outline:none; background:#fff; }
  .filters input[type="search"]:focus, .filters select:focus { border-color:var(--purple); box-shadow:0 0 0 3px rgba(124,58,237,.12); }
  th.sortable { cursor:pointer; user-select:none; white-space:nowrap; }
  th.sortable:hover { color:var(--purple); }
  th.sortable .sorthint { opacity:.5; font-size:10px; }
  .fclear { background:transparent; border:1px solid var(--border); border-radius:9px; padding:7px 13px; font-size:12px; cursor:pointer; font-family:inherit; color:var(--muted); }
  .pill.inprog { background:#E8F1FE; color:#1d4ed8; }
  .pill.stalled { background:#FEF3E2; color:#92400e; }
  .pill.linksent { background:#eef1f5; color:#5b6b76; }
  tr.row[data-noopen] { cursor:default; }
  tr.row[data-noopen]:hover { background:transparent; }
  .tscroll { overflow-x:auto; }
  .pbar { width:84px; height:6px; background:#ece8f8; border-radius:3px; overflow:hidden; }
  .pbar i { display:block; height:100%; background:var(--purple); border-radius:3px; }
  /* I2: fade + scale in AND out (visibility toggle, not display, so the exit
     transition can play) instead of snapping on/off. */
  .modal { position:fixed; inset:0; background:rgba(15,23,42,.5); display:flex; align-items:center; justify-content:center; padding:20px; opacity:0; visibility:hidden; transition:opacity .16s ease, visibility 0s linear .16s; }
  .modal.show { opacity:1; visibility:visible; transition:opacity .16s ease; }
  .sheet { background:#fff; border-radius:var(--radius-lg); max-width:640px; width:100%; max-height:86vh; overflow:auto; padding:0; transform:scale(.97); transition:transform .16s ease; box-shadow:var(--shadow-modal); }
  .modal.show .sheet { transform:scale(1); }
  @media (prefers-reduced-motion: reduce){ .modal, .sheet { transition:none; } }
  .sheet h2 { margin:0 0 2px; font-size:17px; color:var(--teal); }
  .sheet .sub { color:var(--muted); font-size:12px; margin-bottom:16px; }
  .kv { display:grid; grid-template-columns:150px 1fr; gap:6px 14px; font-size:13px; margin-bottom:16px; }
  .kv .k { color:var(--muted); }
  .sec { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--purple); margin:16px 0 6px; }
  .list { font-size:13px; }
  .list div { padding:4px 0; border-bottom:1px solid #f0f2f5; }
  .close { float:right; background:transparent; border:1px solid var(--border); border-radius:9px; padding:6px 13px; cursor:pointer; font-family:inherit; color:var(--muted); }
  /* A2: give the internal tools the same "alive" feedback as the chat. */
  button { transition:filter .15s ease, transform .08s ease; }
  button:not(:disabled):hover { filter:brightness(1.05); }
  button:not(:disabled):active { transform:translateY(1px); }
  .ghost:hover, .fclear:hover, .close:hover { background:#f1eefb; }
  /* E1: styled in-page access gate replacing window.prompt(). */
  .gate { position:fixed; inset:0; background:var(--bg); display:none; align-items:center; justify-content:center; padding:20px; z-index:200; }
  .gate.show { display:flex; }
  .gcard { background:#fff; border:1px solid var(--border); border-radius:var(--radius-lg); padding:28px; max-width:360px; width:100%; text-align:center; box-shadow:var(--shadow-modal); }
  .glogo { width:52px; height:52px; border-radius:50%; background:var(--purple-soft); display:inline-flex; align-items:center; justify-content:center; margin-bottom:14px; }
  .glogo img { width:30px; height:30px; display:block; }
  .gcard h2 { font-size:16px; margin:0 0 4px; color:var(--teal); }
  .gcard p { font-size:12.5px; color:var(--muted); margin:0 0 16px; line-height:1.5; }
  .gcard input { width:100%; border:1px solid var(--border); border-radius:9px; padding:10px 12px; font-size:14px; margin-bottom:10px; font-family:inherit; color:var(--ink); outline:none; }
  .gcard input:focus { border-color:var(--purple); box-shadow:0 0 0 3px rgba(124,58,237,.12); }
  .gerr { color:var(--cherry); font-size:12px; margin-bottom:10px; min-height:16px; }
  .gcard button { width:100%; background:var(--purple); color:#fff; border:none; border-radius:10px; padding:12px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; box-shadow:0 4px 14px rgba(124,58,237,.28); }
  /* E4: sticky modal header + padded body so the title/close stay put in a long brief. */
  .sheethead { position:sticky; top:0; background:#fff; padding:20px 24px 12px; border-bottom:1px solid var(--border); z-index:2; border-radius:16px 16px 0 0; }
  .sheetbody { padding:16px 24px 24px; }
  .qbox { max-height:220px; overflow:auto; background:#f8fafb; border:1px solid var(--border); border-radius:9px; padding:10px; white-space:pre-wrap; font-family:monospace; font-size:12px; }
  /* E4: jump-to-section tabs in the sticky header. */
  .stabs { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }
  .stabs button { background:var(--purple-soft); border:none; border-radius:999px; padding:5px 13px; font-size:11px; font-weight:700; color:var(--purple); cursor:pointer; font-family:inherit; }
  .stabs button:hover { background:#e3d9fb; }
  .sheetbody .sec { scroll-margin-top:96px; }
  @media (max-width:560px){ .wrap{padding:0 12px;} .kpis{grid-template-columns:1fr 1fr;} th,td{padding:9px 8px;} .barlabel{display:none;} }
</style>
</head>
<body>
  <div class="bar">
    <div class="mark"><img src="/lumen-mark.png" alt=""/></div>
    <div class="brand"><b>Lumen</b> <span class="by">by Talkwalker</span></div>
    <span class="barlabel">Proserv dashboard</span>
    <div class="baractions">
      <span class="count" id="count"></span>
      <span class="updated" id="updated"></span>
      <button class="refresh" id="refresh">Refresh</button>
    </div>
  </div>

  <!-- E1: styled access gate; replaces the browser window.prompt() for the token. -->
  <div class="gate" id="gate">
    <form class="gcard" id="gateForm">
      <div class="glogo"><img src="/lumen-mark.png" alt=""/></div>
      <h2>Proserv access</h2>
      <p id="gateMsg">Enter the dashboard access token to view client onboarding sessions.</p>
      <input id="gateInput" type="password" autocomplete="current-password" placeholder="Access token" aria-label="Dashboard access token"/>
      <div class="gerr" id="gateErr"></div>
      <button type="submit">Continue</button>
    </form>
  </div>
  <div class="wrap">
    <h1>Client onboarding sessions</h1>
    <div id="kpis" class="kpis" hidden></div>
    <div id="filters" class="filters" hidden></div>
    <div id="body"><div class="empty">Loading…</div></div>
  </div>

  <div class="modal" id="modal">
    <div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-label="Session detail" tabindex="-1"></div>
  </div>

<script>
  var SESSION_ENDPOINT = "/.netlify/functions/session";
  var SEED_ENDPOINT = "/.netlify/functions/seed";
  var $ = function (id) { return document.getElementById(id); };

  // ---- Access token gate ----
  // Session reads require the DASHBOARD_TOKEN set on the Netlify site. Ask once,
  // keep it for this browser tab (sessionStorage), re-ask if the server says 401.
  function getToken() { return sessionStorage.getItem("dash_token") || ""; }
  // E1: an in-page access card, not a browser window.prompt() (the first thing a
  // teammate sees shouldn't be a native prompt). requestToken() shows the gate and
  // resolves once a token is submitted and stored; the gate never rejects, so an
  // unauthenticated caller simply waits there.
  var _gateResolve = null;
  function requestToken(message) {
    $("gateMsg").textContent = message || "Enter the dashboard access token to view client onboarding sessions.";
    $("gateErr").textContent = "";
    $("gateInput").value = "";
    $("gate").classList.add("show");
    setTimeout(function () { $("gateInput").focus(); }, 50);
    return new Promise(function (resolve) { _gateResolve = resolve; });
  }
  $("gateForm").addEventListener("submit", function (e) {
    e.preventDefault();
    var t = $("gateInput").value.trim();
    if (!t) { $("gateErr").textContent = "Enter a token to continue."; return; }
    sessionStorage.setItem("dash_token", t);
    $("gate").classList.remove("show");
    var r = _gateResolve; _gateResolve = null;
    if (r) r();
  });
  function authedFetch(url) {
    return fetch(url, { headers: { "x-dashboard-token": getToken() } }).then(function (r) {
      if (r.status === 401) {
        sessionStorage.removeItem("dash_token");
        return requestToken("That token was wrong or has expired. Enter it again.").then(function () { return authedFetch(url); });
      }
      return r;
    });
  }

  function fmtDuration(ms) {
    ms = num(ms);
    if (!ms) return "—";
    return Math.round(ms / 60000) + " min";
  }
  function fmtDate(iso) {
    if (!iso) return "—";
    try { return new Date(iso).toLocaleString(); } catch (e) { return iso; }
  }
  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) {
      return { "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;" }[c];
    });
  }
  // Only allow http(s) links to render as clickable. The session record is POSTed
  // by the client, so a tampered sheetUrl (e.g. a "javascript:" URI) must never
  // become a live href. esc() alone doesn't stop the scheme.
  function safeUrl(u) {
    u = String(u == null ? "" : u).trim();
    return /^https?:\/\//i.test(u) ? u : "";
  }
  // Per-MTok rates for the model the proxy runs (claude-sonnet-4-x class):
  // input $3, output $15, cache write $3.75, cache read $0.30. Estimate only.
  var RATES = { input: 3, output: 15, cacheWrite: 3.75, cacheRead: 0.30 };
  // Coerce to a finite number; a non-numeric token field must never reach the
  // math (|| 0 lets a truthy string through and yields NaN tiles).
  function num(x) { x = +x; return Number.isFinite(x) ? x : 0; }
  function costOf(t) {
    if (!t) return null;
    return (num(t.input) * RATES.input + num(t.output) * RATES.output +
      num(t.cacheWrite) * RATES.cacheWrite + num(t.cacheRead) * RATES.cacheRead) / 1e6;
  }
  function totalTokens(t) {
    if (!t) return null;
    return num(t.input) + num(t.output) + num(t.cacheWrite) + num(t.cacheRead);
  }
  var STALE_MS = 48 * 3600 * 1000; // in-progress + idle past this reads as "stalled"
  function displayStatus(s) {
    if (s.status === "link_sent") return "link_sent";
    if (s.status === "completed") return "completed";
    var la = s.lastActiveAt ? Date.parse(s.lastActiveAt) : NaN;
    if (isFinite(la) && (Date.now() - la) > STALE_MS) return "stalled";
    return "in_progress";
  }
  var STATUS_META = {
    completed:   { l: "Completed",   c: "completed" },
    in_progress: { l: "In progress", c: "inprog" },
    stalled:     { l: "Stalled",     c: "stalled" },
    link_sent:   { l: "Link sent",   c: "linksent" },
  };
  function fmtCost(c) { return c == null ? "—" : "$" + c.toFixed(2); }
  function fmtTokens(n) {
    if (n == null) return "—";
    return n >= 1000 ? Math.round(n / 1000) + "k" : String(n);
  }
  function median(nums) {
    var a = nums.filter(function (n) { return n != null; }).sort(function (x, y) { return x - y; });
    if (!a.length) return null;
    var mid = Math.floor(a.length / 2);
    return a.length % 2 ? a[mid] : (a[mid - 1] + a[mid]) / 2;
  }

  async function load() {
    if (!getToken()) { await requestToken(); }
    var btn = $("refresh"), lbl = btn.textContent;
    btn.disabled = true; btn.textContent = "Refreshing…";
    $("body").innerHTML = '<div class="empty">Loading…</div>';
    LINKSENT = [];
    try {
      var r = await authedFetch(SESSION_ENDPOINT);
      if (!r.ok) throw new Error("HTTP " + r.status);
      var data = await r.json();
      render(data.sessions || []);
      $("updated").textContent = "Updated " + new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      // Deep link from the Slack "View full session" link: ?id=<sessionId> opens
      // that session's detail straight away (independent of the list).
      var deepId = new URLSearchParams(location.search).get("id");
      if (deepId) openSession(deepId);
      loadLinkSent();
    } catch (e) {
      $("kpis").hidden = true; $("filters").hidden = true;
      $("body").innerHTML = '<div class="err">Could not load sessions (' + esc(e.message) + '). Check the session function is deployed.</div>';
      $("count").textContent = ""; $("updated").textContent = "";
    } finally {
      btn.disabled = false; btn.textContent = lbl;
    }
  }

  // Fetch generated links and surface those never opened (no matching session)
  // as "Link sent" rows — the top of the funnel. Best-effort: any failure just
  // omits them and leaves the session rows untouched.
  function loadLinkSent() {
    authedFetch(SEED_ENDPOINT)
      .then(function (r) { return r.ok ? r.json() : { seeds: [] }; })
      .then(function (d) {
        var seeds = (d && d.seeds) || [];
        var seen = {}, owners = {};
        SESSIONS.forEach(function (s) { if (s.seedId) seen[s.seedId] = 1; });
        seeds.forEach(function (x) { if (x && x.id && x.preparedBy) owners[x.id] = x.preparedBy; });
        // Owner attribution: join the consultant who prepared the link onto each
        // session by seedId. preparedBy lives only in the token-gated seed store,
        // never on the client-facing session record, so we resolve it here.
        SESSIONS.forEach(function (s) { if (s.seedId && owners[s.seedId]) s.owner = owners[s.seedId]; });
        LINKSENT = seeds.filter(function (x) { return x && x.id && !seen[x.id]; }).map(function (x) {
          return { id: x.id, company: x.company || "(unnamed)", contact: x.contactName || "", email: x.email || "",
            owner: x.preparedBy || "",
            topicCount: 0, channelCount: 0, userCount: 0, status: "link_sent", percent: 0,
            durationMs: null, apiCalls: null, tokens: null, sheetUrl: null, hasHandoff: false,
            seeded: true, seedId: x.id, lastActiveAt: x.savedAt || null, sentAt: null, savedAt: x.savedAt || null, _linkSent: true };
        });
        // Only build the filter bar + table when there is actually something to
        // show. Without this guard, a fresh deploy (0 sessions AND 0 unopened seeds)
        // has its friendly "No onboarding sessions yet" empty state clobbered by a
        // filter bar + "No sessions match. Showing 0 of 0" — which wrongly implies a
        // filter is hiding data. When both are empty, re-assert the empty state.
        if (SESSIONS.length || LINKSENT.length) { renderFilters(); renderTable(); } // owners now known: refresh the owner filter options and the rows
        else { render([]); }
      })
      .catch(function () { /* seeds unavailable — omit link-sent rows */ });
  }

  var SESSIONS = [];
  var LINKSENT = []; // pseudo-rows: seeds (links) generated but never opened
  var FILTER = { status: "all", minPct: 0, q: "", owner: "all", sortKey: "lastActive", sortDir: "desc" };
  // Value a row sorts by for a given column key.
  function sortVal(s, key) {
    if (key === "company") return (s.company || "").toLowerCase();
    if (key === "owner") return (s.owner || "").toLowerCase();
    if (key === "status") return ({ completed: 0, in_progress: 1, stalled: 2, link_sent: 3 })[displayStatus(s)] ?? 9;
    if (key === "percent") return s.percent != null ? s.percent : 0;
    if (key === "time") return s.durationMs || 0;
    if (key === "tokens") return totalTokens(s.tokens) || 0;
    if (key === "lastActive") return Date.parse(s.lastActiveAt || s.sentAt || s.savedAt || "") || 0;
    return 0;
  }

  function renderKpis(sessions) {
    var box = $("kpis");
    var total = sessions.length;
    var completed = sessions.filter(function (s) { return s.status === "completed"; });
    var compN = completed.length;
    var rate = total ? Math.round(compN / total * 100) : 0;
    // Median + time-saved are over completed briefs that have a known duration,
    // so records with no timing neither move the median nor inflate the saving.
    var durs = completed.map(function (s) { return s.durationMs; }).filter(function (n) { return n != null; });
    var medMs = median(durs);
    var medMin = medMs != null ? Math.round(medMs / 60000) : null;
    var savedH = medMin != null ? (durs.length * Math.max(0, 90 - medMin)) / 60 : null;
    var costs = completed.map(function (s) { return costOf(s.tokens); }).filter(function (c) { return c != null; });
    var totalCost = costs.length ? costs.reduce(function (a, b) { return a + b; }, 0) : null;
    var perBrief = (totalCost != null && costs.length) ? totalCost / costs.length : null;
    var kpis = [
      [String(total), total === 1 ? "session" : "sessions"],
      [compN + (total ? " (" + rate + "%)" : ""), "completed"],
      [medMin != null ? medMin + " min" : "—", "median time, start to submit"],
      [savedH != null ? savedH.toFixed(1) + " h" : "—", "est. time saved (vs 90 min manual)"],
      [fmtCost(totalCost), "est. AI spend" + (perBrief != null ? " · " + fmtCost(perBrief) + "/brief" : "")],
    ];
    box.innerHTML = kpis.map(function (k) {
      return '<div class="kpi"><div class="v">' + esc(k[0]) + '</div><div class="l">' + esc(k[1]) + '</div></div>';
    }).join("");
    box.hidden = false;
  }

  function renderFilters() {
    var statusOpts = [["all", "All statuses"], ["completed", "Completed"], ["in_progress", "In progress"], ["stalled", "Stalled"], ["link_sent", "Link sent"]];
    var pctOpts = [["0", "Any progress"], ["25", "25% or more"], ["50", "50% or more"], ["75", "75% or more"], ["100", "100% progress"]];
    var ownerMap = {};
    SESSIONS.concat(LINKSENT).forEach(function (s) { if (s.owner) ownerMap[s.owner] = 1; });
    var ownerKeys = Object.keys(ownerMap).sort();
    var ownerOpts = [["all", "All owners"]].concat(ownerKeys.map(function (o) { return [o, o]; }));
    // esc() the option VALUE too — owner names are user-entered, unlike the fixed
    // status/progress literals. The browser hands back the unescaped value on change.
    function sel(id, label, opts, cur) {
      return '<label>' + esc(label) + ' <select id="' + id + '">' +
        opts.map(function (o) { return '<option value="' + esc(o[0]) + '"' + (String(cur) === o[0] ? " selected" : "") + '>' + esc(o[1]) + '</option>'; }).join("") +
        '</select></label>';
    }
    var box = $("filters");
    box.innerHTML =
      '<input id="fSearch" type="search" placeholder="Search client, contact, email, owner…" value="' + esc(FILTER.q) + '"/>' +
      sel("fStatus", "Status", statusOpts, FILTER.status) + sel("fPct", "Progress", pctOpts, FILTER.minPct) +
      (ownerKeys.length ? sel("fOwner", "Owner", ownerOpts, FILTER.owner) : "") +
      '<button type="button" id="fClear" class="fclear">Clear</button>';
    box.hidden = false;
    // #filters is a separate container from #body, so re-rendering the table on
    // each keystroke does not steal focus from this input.
    $("fSearch").addEventListener("input", function (e) { FILTER.q = e.target.value; renderTable(); });
    $("fStatus").addEventListener("change", function (e) { FILTER.status = e.target.value; renderTable(); });
    $("fPct").addEventListener("change", function (e) { FILTER.minPct = parseInt(e.target.value, 10) || 0; renderTable(); });
    if (ownerKeys.length) $("fOwner").addEventListener("change", function (e) { FILTER.owner = e.target.value; renderTable(); });
    $("fClear").addEventListener("click", function () { FILTER = { status: "all", minPct: 0, q: "", owner: "all", sortKey: "lastActive", sortDir: "desc" }; renderFilters(); renderTable(); });
  }

  function rowHtml(s) {
    var ds = displayStatus(s), meta = STATUS_META[ds] || STATUS_META.in_progress;
    var pct = num(s.percent); // coerce: the session record is client-POSTed, so an un-numeric percent must not reach innerHTML (XSS)
    var url = safeUrl(s.sheetUrl);
    var rep = url
      ? '<a href="' + esc(url) + '" target="_blank" rel="noopener noreferrer" data-link="1">Open Sheet ⤓</a>' + (s.hasHandoff ? '<div class="ho">+ handoff</div>' : "")
      : (s.hasHandoff ? '<span class="hoff">View handoff →</span>' : '<span class="none">—</span>');
    var tok = totalTokens(s.tokens);
    return '<tr class="row"' + (s._linkSent ? ' data-noopen="1"' : '') + ' data-id="' + esc(s.id) + '">' +
      '<td><strong>' + esc(s.company) + '</strong>' + (s.seeded && !s._linkSent ? '<span class="chip">seeded</span>' : "") +
        '<div class="muted">' + esc(s.contact || s.email || "") + '</div></td>' +
      '<td><span class="pill ' + meta.c + '">' + esc(meta.l) + '</span></td>' +
      '<td><div class="pbar"><i style="width:' + pct + '%"></i></div><div class="sub2">' + pct + '%</div></td>' +
      '<td>' + num(s.topicCount) + ' topics · ' + num(s.channelCount) + ' channels · ' + num(s.userCount) + ' users</td>' +
      '<td>' + fmtDuration(s.durationMs) + '</td>' +
      '<td class="num">' + fmtTokens(tok) + '<div class="sub2">' + fmtCost(costOf(s.tokens)) + (typeof s.apiCalls === "number" ? ' · ' + s.apiCalls + ' calls' : "") + '</div></td>' +
      '<td class="muted">' + esc(fmtDate(s.lastActiveAt || s.sentAt || s.savedAt)) + '</td>' +
      '<td class="muted">' + (s.owner ? esc(s.owner) : '<span class="none">—</span>') + '</td>' +
      '<td class="rep">' + rep + '</td>' +
    '</tr>';
  }

  var COLS = [
    { label: "Client", key: "company" }, { label: "Status", key: "status" },
    { label: "Progress", key: "percent" }, { label: "Captured", key: null },
    { label: "Time", key: "time" }, { label: "Tokens / cost", key: "tokens", cls: "num" },
    { label: "Last active", key: "lastActive" }, { label: "Owner", key: "owner" }, { label: "Report", key: null },
  ];

  function renderTable() {
    var q = FILTER.q.trim().toLowerCase();
    // Owner data is joined onto sessions only after the seed fetch resolves
    // (loadLinkSent). Apply the owner filter ONLY when owners are actually known,
    // so an active owner filter can't hide every row during the initial render, on
    // Refresh, or if the seed fetch fails (which would also hide the Owner dropdown,
    // leaving an invisible filter recoverable only via Clear).
    var ownersKnown = SESSIONS.concat(LINKSENT).some(function (s) { return s.owner; });
    var list = SESSIONS.concat(LINKSENT).filter(function (s) {
      if (FILTER.status !== "all" && displayStatus(s) !== FILTER.status) return false;
      if (FILTER.minPct > 0 && (s.percent != null ? s.percent : 0) < FILTER.minPct) return false;
      if (ownersKnown && FILTER.owner && FILTER.owner !== "all" && (s.owner || "") !== FILTER.owner) return false;
      if (q) {
        var hay = ((s.company || "") + " " + (s.contact || "") + " " + (s.email || "") + " " + (s.owner || "")).toLowerCase();
        if (hay.indexOf(q) === -1) return false;
      }
      return true;
    });
    var dir = FILTER.sortDir === "asc" ? 1 : -1;
    list.sort(function (a, b) {
      var va = sortVal(a, FILTER.sortKey), vb = sortVal(b, FILTER.sortKey);
      if (typeof va === "string") return va.localeCompare(vb) * dir;
      return (va - vb) * dir;
    });
    var arrow = FILTER.sortDir === "asc" ? " ▲" : " ▼";
    var head = '<table><thead><tr>' + COLS.map(function (c) {
      if (!c.key) return '<th' + (c.cls ? ' class="' + c.cls + '"' : "") + '>' + esc(c.label) + '</th>';
      var active = FILTER.sortKey === c.key;
      // A resting sortable header must LOOK sortable: show a faint ⇅ until it is
      // the active sort (then the real ▲/▼ takes over). Hover-only affordances are
      // invisible until stumbled upon, and don't exist at all on touch.
      return '<th class="sortable' + (c.cls ? " " + c.cls : "") + '" data-sort="' + c.key + '">' + esc(c.label) + (active ? arrow : ' <span class="sorthint" aria-hidden="true">⇅</span>') + '</th>';
    }).join("") + '</tr></thead><tbody>';
    var bodyRows = list.length ? list.map(rowHtml).join("")
      : '<tr><td colspan="9" class="empty" style="padding:24px">No sessions match.</td></tr>';
    $("body").innerHTML =
      '<div class="tscroll">' + head + bodyRows + '</tbody></table></div>' +
      '<div class="note">Showing ' + list.length + ' of ' + (SESSIONS.length + LINKSENT.length) + '. A session is stored from the client\'s first real answer (marked in progress) and updated as they go; the completed record replaces it on send. "Stalled" = in progress with no activity for 48h. AI cost is an estimate at $' + RATES.input + '/$' + RATES.output + ' per MTok in/out (plus cache rates).</div>';
    Array.prototype.forEach.call(document.querySelectorAll("th.sortable"), function (th) {
      th.addEventListener("click", function () {
        var k = th.getAttribute("data-sort");
        if (FILTER.sortKey === k) { FILTER.sortDir = FILTER.sortDir === "asc" ? "desc" : "asc"; }
        else { FILTER.sortKey = k; FILTER.sortDir = k === "company" ? "asc" : "desc"; }
        renderTable();
      });
    });
    Array.prototype.forEach.call(document.querySelectorAll("tr.row"), function (tr) {
      tr.addEventListener("click", function (e) {
        if (tr.getAttribute("data-noopen")) return; // link-sent rows have no session detail yet
        if (e.target.closest && e.target.closest('a[data-link]')) return; // let the Sheet link open on its own
        openSession(tr.getAttribute("data-id"));
      });
    });
  }

  function render(sessions) {
    SESSIONS = sessions;
    $("count").textContent = sessions.length + (sessions.length === 1 ? " session" : " sessions");
    if (!sessions.length) {
      $("kpis").hidden = true; $("filters").hidden = true;
      $("body").innerHTML = '<div style="text-align:center;padding:56px 20px;color:var(--muted)">' +
        '<div style="font-size:34px;opacity:.5;margin-bottom:10px">📥</div>' +
        '<div style="font-size:15px;font-weight:700;color:var(--teal);margin-bottom:4px">No onboarding sessions yet</div>' +
        '<div style="font-size:13px;line-height:1.5">Sessions appear here the moment a client sends their brief.</div></div>';
      return;
    }
    renderKpis(sessions);
    renderFilters();
    renderTable();
  }

  // Close from anywhere (button, backdrop, Escape) and hand focus back to where
  // the user was — a Proserv user triages many sessions in a row.
  var lastFocus = null;
  function closeModal() {
    $("modal").classList.remove("show");
    if (lastFocus && lastFocus.focus) { try { lastFocus.focus(); } catch (e) {} }
    lastFocus = null;
  }

  function openSession(id) {
    lastFocus = document.activeElement;
    $("sheet").innerHTML = '<div class="empty">Loading…</div>';
    $("modal").classList.add("show");
    $("sheet").focus();
    authedFetch(SESSION_ENDPOINT + "?id=" + encodeURIComponent(id))
      .then(function (r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
      .then(function (data) { renderSheet(data.session); loadSeedNotes(data.session); })
      .catch(function (e) { $("sheet").innerHTML = '<div class="err">Could not open session (' + esc(e.message) + ').</div>'; });
  }

  // Consultant notes live in the seed store, not the session record, and are
  // returned only to a token-authenticated caller. Fetch them separately.
  function loadSeedNotes(s) {
    if (!s || !s.seedId) return;
    var el = $("seedNotes"); if (!el) return;
    authedFetch(SEED_ENDPOINT + "?id=" + encodeURIComponent(s.seedId))
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (d) {
        var notes = d && d.seed && d.seed.notes;
        el.innerHTML = notes ? '<div style="white-space:pre-wrap">' + esc(notes) + '</div>' : '<div class="muted">No notes.</div>';
      })
      .catch(function () { el.innerHTML = '<div class="muted">Could not load notes.</div>'; });
  }

  function renderSheet(s) {
    var c = (s.merged && s.merged.company) || {};
    var topics = (s.merged && Array.isArray(s.merged.topics)) ? s.merged.topics : [];
    var channels = (s.merged && Array.isArray(s.merged.channels)) ? s.merged.channels : [];
    var users = Array.isArray(s.users) ? s.users : [];
    var html = '<div class="sheethead"><button class="close" id="close">Close</button>' +
      '<h2>' + esc(c.name || "(unnamed)") + '</h2>' +
      '<div class="sub">' + esc(c.contact || "") + (c.email ? " · " + esc(c.email) : "") + '</div>' +
      '<div class="stabs"><button type="button" data-sec="topics">Topics</button><button type="button" data-sec="channels">Channels</button><button type="button" data-sec="users">Users</button></div></div>' +
      '<div class="sheetbody"><div class="kv">' +
        kv("Industry", c.industry) +
        kv("Markets", c.markets) +
        kv("Languages", c.languages) +
        kv("Objectives", c.objectives) +
        kv("Teams", c.teams) +
        kv("Timezone", c.timezone) +
        kv("Time spent", fmtDuration(s.durationMs)) +
        kv("AI calls", s.apiCalls != null ? s.apiCalls : "—") +
        kv("Tokens", s.tokens ? (fmtTokens(totalTokens(s.tokens)) + " — " + num(s.tokens.input) + " in / " + num(s.tokens.output) + " out / " + num(s.tokens.cacheRead) + " cached-read") : "—") +
        kv("Est. cost", s.tokens ? fmtCost(costOf(s.tokens)) : "—") +
        kv("Submitted", fmtDate(s.sentAt)) +
      '</div>';

    if (c.objectiveDetails) html += '<div class="sec">Objective details</div><div class="list"><div>' + esc(c.objectiveDetails) + '</div></div>';

    html += '<div class="sec" id="sec-topics">Topics to track (' + topics.length + ')</div><div class="list">' +
      (topics.length ? topics.map(function (t) {
        return '<div><strong>' + esc(t.name) + '</strong>' + (t.keywords ? ' — ' + esc(t.keywords) : "") + (t.rationale ? ' <span class="muted">(' + esc(t.rationale) + ')</span>' : "") + '</div>';
      }).join("") : '<div class="muted">None</div>') + '</div>';

    html += '<div class="sec" id="sec-channels">Channels (' + channels.length + ')</div><div class="list">' +
      (channels.length ? channels.map(function (ch) {
        return '<div>' + esc(ch.author || ch.url || "") + (ch.type ? ' <span class="muted">' + esc(ch.type) + '</span>' : "") + '</div>';
      }).join("") : '<div class="muted">None</div>') + '</div>';

    html += '<div class="sec" id="sec-users">Users (' + users.length + ')</div><div class="list">' +
      (users.length ? users.map(function (u) {
        return '<div>' + esc((u.firstName || "") + " " + (u.lastName || "")) + ' <span class="muted">' + esc(u.email || "") + (u.role ? " · " + esc(u.role) : "") + '</span></div>';
      }).join("") : '<div class="muted">None</div>') + '</div>';

    if (s.queries && s.queries !== "__skip__") {
      html += '<div class="sec">Migrated queries</div><div class="qbox">' + esc(s.queries) + '</div>';
    }

    var sUrl = safeUrl(s.sheetUrl);
    if (sUrl) html += '<div class="sec">Editable Google Sheet</div><div class="list"><div><a href="' + esc(sUrl) + '" target="_blank" rel="noopener noreferrer">Open the client\'s brief in Google Sheets</a></div></div>';

    var h = s.handoff;
    if (h) {
      var hrows = [["Maturity", h.maturity], ["Goal in their words", h.goalInOwnWords], ["Hesitations", h.hesitations], ["AI-suggested, unconfirmed", h.aiSuggestedUnconfirmed], ["Follow-ups for the review call", h.followUps], ["Tips for the consultant", h.consultantTips]]
        .filter(function (r) { return r[1]; })
        .map(function (r) { return '<div><strong>' + esc(r[0]) + ':</strong> ' + esc(r[1]) + '</div>'; }).join("");
      if (hrows) html += '<div class="sec">Consultant handoff</div><div class="list">' + hrows + '</div>';
    }

    if (s.seedId) {
      html += '<div class="sec">Consultant notes (from Sales)</div><div class="list" id="seedNotes"><div class="muted">Loading…</div></div>';
    }

    html += '</div>'; // close .sheetbody
    $("sheet").innerHTML = html;
    $("close").addEventListener("click", closeModal);
    $("close").focus();
    // E4: jump-to-section tabs scroll the modal to Topics / Channels / Users.
    Array.prototype.forEach.call(document.querySelectorAll(".stabs button"), function (b) {
      b.addEventListener("click", function () {
        var el = document.getElementById("sec-" + b.getAttribute("data-sec"));
        if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
      });
    });
  }

  function kv(k, v) {
    if (!v) return "";
    return '<div class="k">' + esc(k) + '</div><div>' + esc(v) + '</div>';
  }

  $("modal").addEventListener("click", function (e) { if (e.target === $("modal")) closeModal(); });
  document.addEventListener("keydown", function (e) { if (e.key === "Escape" && $("modal").classList.contains("show")) closeModal(); });
  $("refresh").addEventListener("click", load);
  load();
</script>
</body>
</html>
