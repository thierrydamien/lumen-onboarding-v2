<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="robots" content="noindex, nofollow"/>
<link rel="icon" href="/lumen-mark.png"/>
<title>Lumen Onboarding — Proserv Dashboard</title>
<!-- INTERNAL PAGE: session reads require DASHBOARD_TOKEN, but the page itself is
     ungated. Gate behind Netlify password protection or Identity before production.
     noindex is a hint to crawlers, not access control. -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"/>
<style>
  :root {
    /* Mirror the client chat (Inter + Lumen purple + waveform mark) so the
       dashboard, sales page and chat read as one product. --teal/--muted/
       --cherry/--mint are kept (the script references them by name in inline
       styles). Design tokens match the T object in lumen.jsx. */
    --purple:#7C3AED; --purple-soft:#EDE7FB;
    --teal:#012B3A; --ink:#0f172a; --cherry:#e11d48; --mint:#DFFFDE;
    --border:#e6e8ee; --muted:#64748b; --bg:#f6f5fb;
    --radius-sm:6px; --radius-md:10px; --radius-lg:16px;
    --shadow-raise:0 1px 3px rgba(15,23,42,.06); --shadow-float:0 8px 24px rgba(0,0,0,.12); --shadow-modal:0 16px 48px rgba(0,0,0,.2);
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:'Inter',Arial,Helvetica,sans-serif; color:var(--ink); background:var(--bg); }

  /* Branded header (matches sales + chat). */
  .bar { background:#fff; border-bottom:1px solid var(--border); padding:12px 24px; display:flex; align-items:center; gap:12px; }
  .mark { width:34px; height:34px; border-radius:50%; background:var(--purple-soft); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .mark img { width:20px; height:20px; display:block; }
  .brand b { font-size:15px; color:var(--purple); letter-spacing:-.01em; }
  .brand .by { font-size:10px; color:var(--muted); }
  .barlabel { font-size:12px; color:var(--muted); border-left:1px solid var(--border); padding-left:12px; }
  .baractions { margin-left:auto; display:flex; align-items:center; gap:12px; }
  .count { font-size:13px; color:var(--muted); }
  .updated { font-size:11px; color:var(--muted); }
  .refresh { background:var(--purple-soft); color:var(--purple); border:none; border-radius:8px; padding:8px 15px; cursor:pointer; font-family:inherit; font-size:12px; font-weight:700; }
  .refresh:disabled { opacity:.6; cursor:default; }

  .wrap { max-width:980px; margin:26px auto; padding:0 20px; }
  h1 { font-size:20px; margin:0 0 16px; color:var(--teal); letter-spacing:-.01em; }
  table { width:100%; border-collapse:collapse; background:#fff; border:1px solid var(--border); border-radius:14px; overflow:hidden; box-shadow:var(--shadow-raise); }
  th, td { text-align:left; padding:12px 14px; font-size:13px; border-bottom:1px solid var(--border); }
  th { background:#faf9fe; font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); font-weight:700; }
  tr:last-child td { border-bottom:none; }
  tr.row { cursor:pointer; }
  tr.row:hover { background:#faf9fe; }
  .pill { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; }
  .pill.completed { background:var(--mint); color:#0a5c2a; }
  .pill.other { background:#eef1f5; color:var(--muted); }
  .muted { color:var(--muted); }
  .empty, .err { text-align:center; padding:40px; color:var(--muted); font-size:14px; }
  .err { color:var(--cherry); }
  .kpis { display:grid; grid-template-columns:repeat(auto-fill, minmax(170px,1fr)); gap:12px; margin-bottom:18px; }
  .kpi { background:#fff; border:1px solid var(--border); border-radius:14px; padding:15px 16px; box-shadow:var(--shadow-raise); }
  .kpi .v { font-size:23px; font-weight:800; color:var(--teal); font-variant-numeric:tabular-nums; letter-spacing:-.02em; }
  .kpi .l { font-size:10.5px; color:var(--muted); margin-top:4px; line-height:1.4; }
  td.num { text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap; }
  th.num { text-align:right; }
  .sub2 { font-size:10.5px; color:var(--muted); }
  .chip { display:inline-block; margin-left:6px; padding:1px 8px; border-radius:20px; font-size:9.5px; font-weight:700; background:var(--purple-soft); color:var(--purple); vertical-align:middle; }
  .rep a { color:#0b6b3a; font-weight:700; text-decoration:underline; font-size:12px; }
  .rep .ho { font-size:11px; color:var(--muted); }
  /* Standalone "handoff ready" (no Sheet yet): the row opens the detail, so make
     it read as an action, not a dead label. */
  .rep .hoff { color:var(--purple); font-weight:700; text-decoration:underline; font-size:12px; cursor:pointer; }
  tr.row:hover .rep .hoff { text-decoration:none; }
  .rep .none { color:var(--muted); }
  .copylink { background:var(--purple-soft); color:var(--purple); border:none; border-radius:7px; padding:4px 10px; font-size:11px; font-weight:700; cursor:pointer; font-family:inherit; white-space:nowrap; }
  .note { font-size:11px; color:var(--muted); margin:14px 2px 0; line-height:1.5; }
  .filters { display:flex; gap:14px; align-items:center; margin-bottom:14px; flex-wrap:wrap; }
  .filters label { font-size:12px; color:var(--muted); display:flex; align-items:center; gap:6px; }
  .filters select { font-family:inherit; font-size:13px; padding:7px 10px; border:1px solid var(--border); border-radius:9px; background:#fff; color:var(--ink); cursor:pointer; outline:none; }
  .filters input[type="search"] { font-family:inherit; font-size:13px; padding:8px 12px; border:1px solid var(--border); border-radius:9px; color:var(--ink); min-width:240px; outline:none; background:#fff; }
  .filters input[type="search"]:focus, .filters select:focus { border-color:var(--purple); box-shadow:0 0 0 3px rgba(124,58,237,.12); }
  .filters input[type="date"] { font-family:inherit; font-size:13px; padding:6px 10px; border:1px solid var(--border); border-radius:9px; background:#fff; color:var(--ink); cursor:pointer; outline:none; }
  .filters input[type="date"]:focus { border-color:var(--purple); box-shadow:0 0 0 3px rgba(124,58,237,.12); }
  .fexport { background:var(--purple-soft); color:var(--purple); border:none; border-radius:9px; padding:7px 13px; font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; }
  th.sortable { cursor:pointer; user-select:none; white-space:nowrap; }
  th.sortable:hover { color:var(--purple); }
  th.sortable .sorthint { opacity:.5; font-size:10px; }
  .fclear { background:transparent; border:1px solid var(--border); border-radius:9px; padding:7px 13px; font-size:12px; cursor:pointer; font-family:inherit; color:var(--muted); }
  .pill.inprog { background:#E8F1FE; color:#1d4ed8; }
  .pill.stalled { background:#FEF3E2; color:#92400e; }
  .pill.linksent { background:#eef1f5; color:#5b6b76; }
  tr.row[data-noopen] { cursor:default; }
  tr.row[data-noopen]:hover { background:transparent; }
  .tscroll { overflow-x:auto; }
  .pbar { width:84px; height:6px; background:#ece8f8; border-radius:3px; overflow:hidden; }
  .pbar i { display:block; height:100%; background:var(--purple); border-radius:3px; }
  /* I2: fade + scale in AND out (visibility toggle, not display, so the exit
     transition can play) instead of snapping on/off. */
  .modal { position:fixed; inset:0; background:rgba(15,23,42,.5); display:flex; align-items:center; justify-content:center; padding:20px; opacity:0; visibility:hidden; transition:opacity .16s ease, visibility 0s linear .16s; }
  .modal.show { opacity:1; visibility:visible; transition:opacity .16s ease; }
  .sheet { background:#fff; border-radius:var(--radius-lg); max-width:640px; width:100%; max-height:86vh; overflow:auto; padding:0; transform:scale(.97); transition:transform .16s ease; box-shadow:var(--shadow-modal); }
  .modal.show .sheet { transform:scale(1); }
  @media (prefers-reduced-motion: reduce){ .modal, .sheet { transition:none; } }
  .sheet h2 { margin:0 0 2px; font-size:17px; color:var(--teal); }
  .sheet .sub { color:var(--muted); font-size:12px; margin-bottom:16px; }
  .kv { display:grid; grid-template-columns:150px 1fr; gap:6px 14px; font-size:13px; margin-bottom:16px; }
  .kv .k { color:var(--muted); }
  .sec { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--purple); margin:16px 0 6px; }
  .list { font-size:13px; }
  .list div { padding:4px 0; border-bottom:1px solid #f0f2f5; }
  .close { float:right; background:transparent; border:1px solid var(--border); border-radius:9px; padding:6px 13px; cursor:pointer; font-family:inherit; color:var(--muted); }
  /* A2: give the internal tools the same "alive" feedback as the chat. */
  button { transition:filter .15s ease, transform .08s ease; }
  button:not(:disabled):hover { filter:brightness(1.05); }
  button:not(:disabled):active { transform:translateY(1px); }
  .ghost:hover, .fclear:hover, .close:hover { background:#f1eefb; }
  /* E1: styled in-page access gate replacing window.prompt(). */
  .gate { position:fixed; inset:0; background:var(--bg); display:none; align-items:center; justify-content:center; padding:20px; z-index:200; }
  .gate.show { display:flex; }
  .gcard { background:#fff; border:1px solid var(--border); border-radius:var(--radius-lg); padding:28px; max-width:360px; width:100%; text-align:center; box-shadow:var(--shadow-modal); }
  .glogo { width:52px; height:52px; border-radius:50%; background:var(--purple-soft); display:inline-flex; align-items:center; justify-content:center; margin-bottom:14px; }
  .glogo img { width:30px; height:30px; display:block; }
  .gcard h2 { font-size:16px; margin:0 0 4px; color:var(--teal); }
  .gcard p { font-size:12.5px; color:var(--muted); margin:0 0 16px; line-height:1.5; }
  .gcard input { width:100%; border:1px solid var(--border); border-radius:9px; padding:10px 12px; font-size:14px; margin-bottom:10px; font-family:inherit; color:var(--ink); outline:none; }
  .gcard input:focus { border-color:var(--purple); box-shadow:0 0 0 3px rgba(124,58,237,.12); }
  .gerr { color:var(--cherry); font-size:12px; margin-bottom:10px; min-height:16px; }
  .gcard button { width:100%; background:var(--purple); color:#fff; border:none; border-radius:10px; padding:12px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; box-shadow:0 4px 14px rgba(124,58,237,.28); }
  /* E4: sticky modal header + padded body so the title/close stay put in a long brief. */
  .sheethead { position:sticky; top:0; background:#fff; padding:20px 24px 12px; border-bottom:1px solid var(--border); z-index:2; border-radius:16px 16px 0 0; }
  .sheetbody { padding:16px 24px 24px; }
  .qbox { max-height:220px; overflow:auto; background:#f8fafb; border:1px solid var(--border); border-radius:9px; padding:10px; white-space:pre-wrap; font-family:monospace; font-size:12px; }
  /* E4: jump-to-section tabs in the sticky header. */
  .stabs { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }
  .stabs button { background:var(--purple-soft); border:none; border-radius:999px; padding:5px 13px; font-size:11px; font-weight:700; color:var(--purple); cursor:pointer; font-family:inherit; }
  .stabs button:hover { background:#e3d9fb; }
  .sheetbody .sec { scroll-margin-top:96px; }
  /* Feature 5: amber "stalled sessions" banner above the KPIs. */
  .banner { display:flex; align-items:center; gap:12px; background:#FEF3E2; border:1px solid #F5D9A8; color:#92400e; border-radius:12px; padding:12px 16px; margin-bottom:16px; font-size:13px; line-height:1.4; }
  .banner button { margin-left:auto; flex-shrink:0; background:#92400e; color:#fff; border:none; border-radius:8px; padding:7px 13px; font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; }
  /* Info variant for the "new activity" nudge (distinct from the amber stalled banner). */
  .banner.info { background:var(--purple-soft); border-color:#d9cbf7; color:var(--purple); }
  .banner.info button { background:var(--purple); }
  /* Feature 6: small "Copy handoff" action in the handoff section header. */
  .copybtn { float:right; background:var(--purple-soft); color:var(--purple); border:none; border-radius:8px; padding:3px 10px; font-size:10.5px; font-weight:700; cursor:pointer; font-family:inherit; text-transform:none; letter-spacing:normal; }

  /* ---- Insights panel (charts) ---- */
  .inshead { display:flex; align-items:center; gap:10px; margin:2px 2px 12px; }
  .inshead h2 { font-size:13px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin:0; font-weight:700; }
  .instoggle { margin-left:auto; background:transparent; border:1px solid var(--border); border-radius:8px; padding:5px 12px; font-size:11.5px; color:var(--muted); cursor:pointer; font-family:inherit; font-weight:600; }
  .ins { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
  .ins.hidden { display:none; }
  .chart { background:#fff; border:1px solid var(--border); border-radius:14px; padding:15px 16px; box-shadow:var(--shadow-raise); }
  .chart.wide { grid-column:1 / -1; }
  .chart h4 { margin:0 0 13px; font-size:11.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); font-weight:700; }
  .chart .nodata { font-size:12px; color:var(--muted); padding:8px 0 4px; }
  /* One-shot entrance the first time the panel appears (the .appear class is added
     once, then removed), so the bars grow in on load but don't re-animate or flicker
     on every filter/search re-render. */
  @keyframes insFade { from { opacity:0; transform:translateY(6px);} to { opacity:1; transform:none;} }
  /* Grow via transform (not width/height): the bar keeps its final layout size, so
     it is fully coloured the instant the one-shot animation ends and never leaves an
     empty track. transform-origin anchors the growth to the base of each bar. */
  @keyframes growW { from { transform:scaleX(0); } }
  @keyframes growH { from { transform:scaleY(0); } }
  .ins.appear .chart { animation:insFade .45s ease both; }
  .ins.appear .barfill, .ins.appear .ffill { animation:growW .7s cubic-bezier(.2,.8,.2,1) both; transform-origin:left center; }
  .ins.appear .cbar { animation:growH .6s cubic-bezier(.2,.8,.2,1) both; transform-origin:center bottom; }
  @media (prefers-reduced-motion: reduce){ .ins.appear .chart, .ins.appear .barfill, .ins.appear .ffill, .ins.appear .cbar { animation:none; } }
  /* Horizontal bars (by rep / package / language) */
  .barrow { display:flex; align-items:center; gap:10px; margin-bottom:9px; font-size:12px; }
  .barrow .lbl { width:34%; min-width:96px; flex-shrink:0; color:var(--teal); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .bartrack { flex:1; height:20px; background:#edeff4; border-radius:6px; overflow:hidden; }
  .barfill { display:block; height:100%; background:linear-gradient(90deg,#6d28d9,#8b5cf6); border-radius:6px; min-width:3px; }
  .barval { width:78px; flex-shrink:0; text-align:right; font-variant-numeric:tabular-nums; color:var(--teal); font-weight:700; }
  .barval small { color:var(--muted); font-weight:600; }
  /* Clickable breakdown rows (cross-filtering). */
  .barrow-click { cursor:pointer; padding:3px 6px; margin-left:-6px; margin-right:-6px; border-radius:8px; outline:none; }
  .barrow-click:hover { background:#f4f2fc; }
  .barrow-click:focus-visible { box-shadow:0 0 0 2px rgba(124,58,237,.4); }
  .barrow.active { background:#efeafe; }
  .barrow.active .lbl { color:var(--purple); font-weight:700; }
  .chint { font-weight:600; text-transform:none; letter-spacing:0; color:#a9b0bd; font-size:10px; margin-left:6px; }
  /* Funnel */
  .fstage { margin-bottom:13px; }
  .fhead { display:flex; justify-content:space-between; align-items:baseline; font-size:12px; color:var(--muted); margin-bottom:4px; }
  .fhead b { color:var(--teal); font-size:16px; font-variant-numeric:tabular-nums; }
  .ftrack { height:16px; background:#edeff4; border-radius:8px; overflow:hidden; }
  .ffill { display:block; height:100%; border-radius:8px; min-width:3px; }
  .conv { font-size:10.5px; color:var(--muted); margin-top:3px; }
  /* Vertical bars (completions over time) */
  .spark { display:flex; align-items:flex-end; gap:5px; height:104px; }
  .scol { flex:1; display:flex; flex-direction:column; justify-content:flex-end; align-items:center; height:100%; min-width:0; }
  .cval { font-size:10px; color:var(--teal); font-weight:700; margin-bottom:3px; }
  .cbar { width:100%; max-width:26px; background:linear-gradient(180deg,#a855f7,#7C3AED); border-radius:5px 5px 0 0; min-height:2px; }
  .clbl { font-size:9px; color:var(--muted); margin-top:6px; white-space:nowrap; }

  @media (max-width:560px){ .wrap{padding:0 12px;} .kpis{grid-template-columns:1fr 1fr;} .ins{grid-template-columns:1fr;} th,td{padding:9px 8px;} .barlabel{display:none;} }
</style>
</head>
<body>
  <div class="bar">
    <div class="mark"><img src="/lumen-mark.png" alt=""/></div>
    <div class="brand"><b>Lumen</b> <span class="by">by Talkwalker</span></div>
    <span class="barlabel">Proserv dashboard</span>
    <div class="baractions">
      <span class="count" id="count"></span>
      <span class="updated" id="updated"></span>
      <button class="refresh" id="refresh">Refresh</button>
    </div>
  </div>

  <!-- E1: styled access gate; replaces the browser window.prompt() for the token. -->
  <div class="gate" id="gate">
    <form class="gcard" id="gateForm">
      <div class="glogo"><img src="/lumen-mark.png" alt=""/></div>
      <h2>Proserv access</h2>
      <p id="gateMsg">Enter the dashboard access token to view client onboarding sessions.</p>
      <input id="gateInput" type="password" autocomplete="current-password" placeholder="Access token" aria-label="Dashboard access token"/>
      <div class="gerr" id="gateErr"></div>
      <button type="submit">Continue</button>
    </form>
  </div>
  <div class="wrap">
    <h1>Client onboarding sessions</h1>
    <div id="stalledBanner"></div>
    <div id="updateBanner"></div>
    <div id="kpis" class="kpis" hidden></div>
    <div id="insightsWrap" hidden>
      <div class="inshead"><h2>Insights</h2><button type="button" id="insToggle" class="instoggle">Hide</button></div>
      <div id="insights" class="ins"></div>
    </div>
    <div id="filters" class="filters" hidden></div>
    <div id="body"><div class="empty">Loading…</div></div>
  </div>

  <div class="modal" id="modal">
    <div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-label="Session detail" tabindex="-1"></div>
  </div>

<script>
  var SESSION_ENDPOINT = "/.netlify/functions/session";
  var SEED_ENDPOINT = "/.netlify/functions/seed";
  var $ = function (id) { return document.getElementById(id); };

  // ---- Access token gate ----
  // Session reads require the DASHBOARD_TOKEN set on the Netlify site. Ask once,
  // keep it for this browser tab (sessionStorage), re-ask if the server says 401.
  function getToken() { return sessionStorage.getItem("dash_token") || ""; }
  // E1: an in-page access card, not a browser window.prompt() (the first thing a
  // teammate sees shouldn't be a native prompt). requestToken() shows the gate and
  // resolves once a token is submitted and stored; the gate never rejects, so an
  // unauthenticated caller simply waits there.
  // Queue of pending resolvers (not a single slot): when several authedFetch calls
  // hit 401 close together, each pushes its resolver here and they ALL resolve when
  // one token is submitted. A single slot let the second 401 overwrite the first,
  // orphaning that fetch chain so the dashboard could hang on "Loading...".
  var _gateWaiters = [];
  function requestToken(message) {
    if (!$("gate").classList.contains("show")) {
      $("gateMsg").textContent = message || "Enter the dashboard access token to view client onboarding sessions.";
      $("gateErr").textContent = "";
      $("gateInput").value = "";
      $("gate").classList.add("show");
      setTimeout(function () { $("gateInput").focus(); }, 50);
    }
    return new Promise(function (resolve) { _gateWaiters.push(resolve); });
  }
  $("gateForm").addEventListener("submit", function (e) {
    e.preventDefault();
    var t = $("gateInput").value.trim();
    if (!t) { $("gateErr").textContent = "Enter a token to continue."; return; }
    sessionStorage.setItem("dash_token", t);
    $("gate").classList.remove("show");
    var waiters = _gateWaiters; _gateWaiters = [];
    waiters.forEach(function (r) { r(); });
  });
  function authedFetch(url) {
    return fetch(url, { headers: { "x-dashboard-token": getToken() } }).then(function (r) {
      if (r.status === 401) {
        sessionStorage.removeItem("dash_token");
        return requestToken("That token was wrong or has expired. Enter it again.").then(function () { return authedFetch(url); });
      }
      return r;
    });
  }

  function fmtDuration(ms) {
    ms = num(ms);
    if (!ms) return "—";
    return Math.round(ms / 60000) + " min";
  }
  function fmtDate(iso) {
    if (!iso) return "—";
    try { return new Date(iso).toLocaleString(); } catch (e) { return iso; }
  }
  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) {
      return { "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;" }[c];
    });
  }
  // Only allow http(s) links to render as clickable. The session record is POSTed
  // by the client, so a tampered sheetUrl (e.g. a "javascript:" URI) must never
  // become a live href. esc() alone doesn't stop the scheme.
  function safeUrl(u) {
    u = String(u == null ? "" : u).trim();
    return /^https?:\/\//i.test(u) ? u : "";
  }
  // The client onboarding link for a seed, same shape the sales page generates.
  function clientLink(seedId) { return location.origin + "/chat?s=" + encodeURIComponent(seedId); }
  // Per-MTok rates for the model the proxy runs (claude-sonnet-4-x class):
  // input $3, output $15, cache write $3.75, cache read $0.30. Estimate only.
  var RATES = { input: 3, output: 15, cacheWrite: 3.75, cacheRead: 0.30 };
  // Coerce to a finite number; a non-numeric token field must never reach the
  // math (|| 0 lets a truthy string through and yields NaN tiles).
  function num(x) { x = +x; return Number.isFinite(x) ? x : 0; }
  function costOf(t) {
    if (!t) return null;

  // Fetch generated links and surface those never opened (no matching session)

  function loadLinkSent() {

      .then(function (r) { return r.ok ? r.json() : { seeds: [] }; })
      .then(function (d) {

        // filter is hiding data. When both are empty, re-assert the empty state.

  var SESSIONS = [];

    if (key === "percent") return s.percent != null ? s.percent : 0;
    if (key === "time") return s.durationMs || 0;
    if (key === "tokens") return totalTokens(s.tokens) || 0;

  function renderKpis(sessions) {
    var box = $("kpis");
    var fs = FILTER.status;

    // timing/cost, so they never feed the completion rate or the time/spend
    // cards. They ARE counted when you filter to the "Link sent" status.
    var real = sessions.filter(function (s) { return !s._linkSent; });
    // Total: real sessions in the default view; the rows actually shown when a

  // ---- Insights charts. Recomputed from the current filtered list on every

  function groupCounts(rows, keyFn) {

      var attrs = fk ? ' data-fk="' + esc(fk) + '" data-fv="' + esc(String(i.key == null ? "" : i.key)) + '" role="button" tabindex="0" aria-pressed="' + (active ? "true" : "false") + '" title="Filter to ' + esc(i.label) + '"' : '';

  function funnelHtml(linksSent, started, completed) {
    var stages = [

      { l: "Started", v: started, c: "#6d28d9" },
      { l: "Completed", v: completed, c: "#16a34a" }

    var top = linksSent || started || 1;
    return stages.map(function (st, i) {
      var pct = Math.max(2, Math.min(100, Math.round(st.v / top * 100)));
      var conv = "";

      if (i === 2 && started) conv = Math.round(completed / started * 100) + "% of started sessions finished";
      return '<div class="fstage"><div class="fhead"><span>' + esc(st.l) + '</span><b>' + st.v + '</b></div>' +
        '<div class="ftrack"><span class="ffill" style="width:' + pct + '%;background:' + st.c + '"></span></div>' +

  // Weekly completed counts, bucketed by the Monday of each session's week, most

      var t = Date.parse(s.savedAt || s.sentAt || s.lastActiveAt || "");
      if (!isFinite(t)) return;
      var d = new Date(t), day = (d.getDay() + 6) % 7;

    return '<div class="spark">' + series.map(function (s) {
      var pct = Math.max(3, Math.min(100, Math.round(s.value / max * 100)));
      return '<div class="scol"><div class="cval">' + s.value + '</div>' +

    var byRep = toBars(groupCounts(getFilteredList("owner"), function (s) { return s.owner; }), function (k) { return k; });

    var langTotal = langGroups.reduce(function (a, g) { return a + g.total; }, 0);
    var byLang = langGroups.slice(0, 8).map(function (g) {

    });
    box.innerHTML =
      '<div class="chart"><h4>Onboarding funnel</h4>' + funnelHtml(linksSentN, started.length, completedN) + '</div>' +
      '<div class="chart"><h4>Completed per week</h4>' + sparkHtml(weeklyCompletions(list)) + '</div>' +

  function renderFilters() {
    var statusOpts = [["all", "All statuses"], ["completed", "Completed"], ["in_progress", "In progress"], ["stalled", "Stalled"], ["link_sent", "Link sent"]];
    var pctOpts = [["0", "Any progress"], ["25", "25% or more"], ["50", "50% or more"], ["75", "75% or more"], ["100", "100% progress"]];
    var ownerMap = {}, pkgMap = {}, langMap = {};

      if (s.pkg) pkgMap[s.pkg] = 1;

    });

    // Package options sorted by their friendly label; value stays the raw code.

    var pkgOpts = [["all", "All packages"]].concat(pkgKeys.map(function (c) { return [c, pkgLabel(c)]; }));
    var langKeys = Object.keys(langMap).sort();

        '</select></label>';

      '<input id="fSearch" type="search" placeholder="Search client, contact, email, prepared by…" value="' + esc(FILTER.q) + '"/>' +
      sel("fStatus", "Status", statusOpts, FILTER.status) + sel("fPct", "Progress", pctOpts, FILTER.minPct) +

      (pkgKeys.length ? sel("fPkg", "Package", pkgOpts, FILTER.pkg) : "") +
      (langKeys.length ? sel("fLang", "Language", langOpts, FILTER.lang) : "") +
      '<label>From <input id="fFrom" type="date" value="' + esc(FILTER.dateFrom) + '"/></label>' +
      '<label>To <input id="fTo" type="date" value="' + esc(FILTER.dateTo) + '"/></label>' +
      '<button type="button" id="fClear" class="fclear">Clear</button>' +
      '<button type="button" id="fExport" class="fexport">Export CSV</button>';

    // each keystroke does not steal focus from this input.
    $("fSearch").addEventListener("input", function (e) { FILTER.q = e.target.value; renderTable(); });
    $("fStatus").addEventListener("change", function (e) { FILTER.status = e.target.value; renderTable(); });
    $("fPct").addEventListener("change", function (e) { FILTER.minPct = parseInt(e.target.value, 10) || 0; renderTable(); });
    if (ownerKeys.length) $("fOwner").addEventListener("change", function (e) { FILTER.owner = e.target.value; renderTable(); });
    if (pkgKeys.length) $("fPkg").addEventListener("change", function (e) { FILTER.pkg = e.target.value; renderTable(); });
    if (langKeys.length) $("fLang").addEventListener("change", function (e) { FILTER.lang = e.target.value; renderTable(); });

    $("fFrom").addEventListener("change", function (e) { FILTER.dateFrom = e.target.value; renderTable(); });
    $("fTo").addEventListener("change", function (e) { FILTER.dateTo = e.target.value; renderTable(); });
    $("fClear").addEventListener("click", function () { FILTER = { status: "all", minPct: 0, q: "", owner: "all", pkg: "all", lang: "all", dateFrom: "", dateTo: "", sortKey: "lastActive", sortDir: "desc" }; renderFilters(); renderTable(); });

  }

  function rowHtml(s) {
    var ds = displayStatus(s), meta = STATUS_META[ds] || STATUS_META.in_progress;
    var pct = num(s.percent); // coerce: the session record is client-POSTed, so an un-numeric percent must not reach innerHTML (XSS)
    var url = safeUrl(s.sheetUrl);
    var dash = '<span class="none">—</span>';
    var rep = url
      ? '<a href="' + esc(url) + '" target="_blank" rel="noopener noreferrer" data-link="1">Open Sheet ⤓</a>' + (s.hasHandoff ? '<div class="ho">+ handoff</div>' : "")
      : (s.hasHandoff ? '<span class="hoff">View handoff →</span>' : dash);
    // Re-send affordance: a never-opened link or a stalled session gets a one-click
    // copy of the client link (origin/chat?s=<seedId>) so the consultant can chase it.
    if ((ds === "link_sent" || ds === "stalled") && s.seedId) {
      var cbtn = '<button type="button" class="copylink" data-link="1" data-copy="' + esc(clientLink(s.seedId)) + '">Copy link</button>';

    }

      '<td><strong>' + esc(s.company) + '</strong>' + (s.seeded && !s._linkSent ? '<span class="chip">seeded</span>' : "") +
        '<div class="muted">' + esc(s.contact || s.email || "") + '</div></td>' +
      '<td><span class="pill ' + meta.c + '">' + esc(meta.l) + '</span></td>' +
      '<td><div class="pbar"><i style="width:' + pct + '%"></i></div><div class="sub2">' + pct + '%</div></td>' +
      '<td>' + num(s.topicCount) + ' topics · ' + num(s.channelCount) + ' channels · ' + num(s.userCount) + ' users</td>' +
      '<td>' + fmtDuration(s.durationMs) + '</td>' +
      '<td class="num">' + fmtTokens(tok) + '<div class="sub2">' + fmtCost(costOf(s.tokens)) + (typeof s.apiCalls === "number" ? ' · ' + s.apiCalls + ' calls' : "") + '</div></td>' +
      '<td class="muted">' + esc(fmtDate(s.lastActiveAt || s.sentAt || s.savedAt)) + '</td>' +
      '<td class="muted">' + (s.owner ? esc(s.owner) : '<span class="none">—</span>') + '</td>' +
      '<td class="rep">' + rep + '</td>' +
    '</tr>';
  }

  var COLS = [
    { label: "Client", key: "company" }, { label: "Status", key: "status" },
    { label: "Progress", key: "percent" }, { label: "Captured", key: null },
    { label: "Time", key: "time" }, { label: "Tokens / cost", key: "tokens", cls: "num" },
    { label: "Last active", key: "lastActive" }, { label: "Prepared by", key: "owner" }, { label: "Report", key: null },
  ];

  // Shared filter predicate for the current view. renderTable() (table + KPIs)
  // and exportCsv() both build off this, so the CSV export always mirrors exactly
  // what the table shows. Returns the filtered (unsorted) list.
  // Parse a yyyy-mm-dd filter value into a LOCAL-time epoch ms boundary. end=true
  // returns end-of-day (23:59:59.999). Empty/invalid -> NaN (unbounded).
  function localDay(s, end) {
    if (!s) return NaN;
    var p = String(s).split("-");
    if (p.length !== 3) return NaN;
    var d = end ? new Date(+p[0], +p[1] - 1, +p[2], 23, 59, 59, 999)
                : new Date(+p[0], +p[1] - 1, +p[2], 0, 0, 0, 0);
    var t = d.getTime();
    return isFinite(t) ? t : NaN;
  }
  // Sort a list in place by the active sort column/direction. Shared by the table
  // and the CSV export so the export matches the on-screen order.
  function sortList(list) {
    var dir = FILTER.sortDir === "asc" ? 1 : -1;
    return list.sort(function (a, b) {
      var va = sortVal(a, FILTER.sortKey), vb = sortVal(b, FILTER.sortKey);
      if (typeof va === "string") return va.localeCompare(vb) * dir;
      return (va - vb) * dir;
    });
  }
  function getFilteredList(except) {
    var q = FILTER.q.trim().toLowerCase();
    // Owner data is joined onto sessions only after the seed fetch resolves
    // (loadLinkSent). Apply the owner filter ONLY when owners are actually known,
    // so an active owner filter can't hide every row during the initial render, on
    // Refresh, or if the seed fetch fails (which would also hide the Owner dropdown,
    // leaving an invisible filter recoverable only via Clear).
    var ownersKnown = SESSIONS.concat(LINKSENT).some(function (s) { return s.owner; });
    // Package/language are joined from the seed store on the same async pass as owner,
    // so gate their filters the same way: don't apply until the data is actually known,
    // or a Refresh with an active filter would blank the table until the join lands.
    var pkgKnown = SESSIONS.concat(LINKSENT).some(function (s) { return s.pkg; });
    var langKnown = SESSIONS.concat(LINKSENT).some(function (s) { return s.lang; });
    // Feature 4: date range. "To" is inclusive to end-of-day. Empty = unbounded.
    // Parse the yyyy-mm-dd inputs as LOCAL day boundaries (not Date.parse, which
    // reads a date-only string as UTC midnight). The table shows timestamps in
    // local time, so a UTC boundary would drop near-midnight rows off the wrong
    // end for any viewer west of UTC (e.g. Vancouver).
    var fromMs = localDay(FILTER.dateFrom, false);
    var toMs = localDay(FILTER.dateTo, true);
    return SESSIONS.concat(LINKSENT).filter(function (s) {
      if (FILTER.status !== "all" && displayStatus(s) !== FILTER.status) return false;
      if (FILTER.minPct > 0 && (s.percent != null ? s.percent : 0) < FILTER.minPct) return false;
      if (except !== "owner" && ownersKnown && FILTER.owner && FILTER.owner !== "all" && (s.owner || "") !== FILTER.owner) return false;
      if (except !== "pkg" && pkgKnown && FILTER.pkg && FILTER.pkg !== "all" && (s.pkg || "") !== FILTER.pkg) return false;
      if (except !== "lang" && langKnown && FILTER.lang && FILTER.lang !== "all" && (s.lang || "") !== FILTER.lang) return false;
      if (isFinite(fromMs) || isFinite(toMs)) {
        var when = Date.parse(s.lastActiveAt || s.sentAt || s.savedAt || "");
        // A row with no parseable date can't fall inside a bounded range, so drop it.
        if (isFinite(fromMs) && !(when >= fromMs)) return false;
        if (isFinite(toMs) && !(when <= toMs)) return false;
      }
      if (q) {
        var hay = ((s.company || "") + " " + (s.contact || "") + " " + (s.email || "") + " " + (s.owner || "") + " " + pkgLabel(s.pkg) + " " + (s.lang || "")).toLowerCase();
        if (hay.indexOf(q) === -1) return false;
      }
      return true;
    });
  }

  function renderTable() {
    var list = getFilteredList();
    // KPI cards + insight charts sit above the filters and must agree with what's
    // shown, so recompute them from the filtered list on every filter/search/sort
    // change (renderKpis drops the link-sent pseudo-rows itself).
    renderKpis(list);
    renderInsights(list);
    sortList(list);
    var arrow = FILTER.sortDir === "asc" ? " ▲" : " ▼";
    var head = '<table><thead><tr>' + COLS.map(function (c) {
      if (!c.key) return '<th' + (c.cls ? ' class="' + c.cls + '"' : "") + '>' + esc(c.label) + '</th>';
      var active = FILTER.sortKey === c.key;
      // A resting sortable header must LOOK sortable: show a faint ⇅ until it is
      // the active sort (then the real ▲/▼ takes over). Hover-only affordances are
      // invisible until stumbled upon, and don't exist at all on touch.
      return '<th class="sortable' + (c.cls ? " " + c.cls : "") + '" data-sort="' + c.key + '">' + esc(c.label) + (active ? arrow : ' <span class="sorthint" aria-hidden="true">⇅</span>') + '</th>';
    }).join("") + '</tr></thead><tbody>';
    var bodyRows = list.length ? list.map(rowHtml).join("")
      : '<tr><td colspan="9" class="empty" style="padding:24px">No sessions match.</td></tr>';
    $("body").innerHTML =
      '<div class="tscroll">' + head + bodyRows + '</tbody></table></div>' +
      '<div class="note">Showing ' + list.length + ' of ' + (SESSIONS.length + LINKSENT.length) + '. A session is stored from the client\'s first real answer (marked in progress) and updated as they go; the completed record replaces it on send. "Stalled" = in progress with no activity for 48h. AI cost is an estimate at $' + RATES.input + '/$' + RATES.output + ' per MTok in/out (plus cache rates).</div>';
    Array.prototype.forEach.call(document.querySelectorAll("th.sortable"), function (th) {
      th.addEventListener("click", function () {
        var k = th.getAttribute("data-sort");
        if (FILTER.sortKey === k) { FILTER.sortDir = FILTER.sortDir === "asc" ? "desc" : "asc"; }
        else { FILTER.sortKey = k; FILTER.sortDir = k === "company" ? "asc" : "desc"; }
        renderTable();
      });
    });
    Array.prototype.forEach.call(document.querySelectorAll("tr.row"), function (tr) {
      tr.addEventListener("click", function (e) {
        if (tr.getAttribute("data-noopen")) return; // link-sent rows have no session detail yet
        if (e.target.closest && e.target.closest('[data-link]')) return; // let the Sheet link / Copy-link button handle their own click
        openSession(tr.getAttribute("data-id"));
      });
    });
    // Copy-link buttons on link-sent / stalled rows: copy the client link to re-send.
    Array.prototype.forEach.call(document.querySelectorAll(".copylink"), function (b) {
      b.addEventListener("click", function (e) {
        e.stopPropagation();
        copyText(b.getAttribute("data-copy"), b, "Copy link");
      });
    });
  }

  // Feature 3: CSV field escaping. Wrap in double quotes when the value contains
  // a comma, quote or newline, and double any internal quotes.
  function csvCell(v) {
    var s = String(v == null ? "" : v);
    // Neutralize spreadsheet formula injection: a field starting with = + - @ (or
    // a tab/CR) can be executed as a formula by Excel/Sheets. Client-POSTed fields
    // (company, contact, email, prepared by, sheet url) are untrusted, so prefix a
    // single quote to force the cell to text before the delimiter-escaping below.
    if (/^[=+\-@\t\r]/.test(s)) s = "'" + s;
    return /[",\r\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  }
  // Feature 3: export EXACTLY the current filtered view (same predicate the table
  // uses, via getFilteredList) as a CSV, downloaded client-side via a Blob URL.
  function exportCsv() {
    var list = sortList(getFilteredList()); // match the on-screen sort order
    var headers = ["Client", "Contact", "Email", "Status", "Progress %", "Package", "Language", "Topics", "Channels", "Users", "Time (min)", "Tokens", "Est cost", "Last active", "Prepared by", "Sheet URL"];
    var lines = [headers.map(csvCell).join(",")];
    list.forEach(function (s) {
      var meta = STATUS_META[displayStatus(s)] || STATUS_META.in_progress;
      var tok = totalTokens(s.tokens);
      var cost = costOf(s.tokens);
      lines.push([
        s.company || "",
        s.contact || "",
        s.email || "",
        meta.l,
        s.percent != null ? num(s.percent) : 0,
        pkgLabel(s.pkg),
        s.lang || "",
        num(s.topicCount),
        num(s.channelCount),
        num(s.userCount),
        s.durationMs != null ? Math.round(num(s.durationMs) / 60000) : "",
        tok != null ? tok : "",
        cost != null ? cost.toFixed(2) : "",
        s.lastActiveAt || s.sentAt || s.savedAt || "",
        s.owner || "",
        safeUrl(s.sheetUrl)
      ].map(csvCell).join(","));
    });
    var csv = lines.join("\r\n") + "\r\n";
    // Lead with a UTF-8 BOM so Excel (Windows) reads accented/Arabic client and
    // contact names correctly instead of mojibake.
    var blob = new Blob(["﻿" + csv], { type: "text/csv;charset=utf-8;" });
    var url = URL.createObjectURL(blob);
    var d = new Date();
    var stamp = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
    var a = document.createElement("a");
    a.href = url;
    a.download = "lumen-sessions-" + stamp + ".csv";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 0);
  }

  // Feature 5: count stalled sessions across ALL sessions (not the filtered
  // list) and surface an amber banner above the KPIs. Clicking it filters to
  // stalled. Recomputed on every data reload (called from render).
  function renderStalledBanner() {
    var el = $("stalledBanner");
    if (!el) return;
    var n = SESSIONS.filter(function (s) { return displayStatus(s) === "stalled"; }).length;
    if (!n) { el.innerHTML = ""; return; }
    el.innerHTML = '<div class="banner"><span>' + n +
      (n === 1 ? " onboarding session is" : " onboarding sessions are") +
      ' stalled (no activity for 48h+).</span>' +
      '<button type="button" id="stalledView">View stalled</button></div>';
    $("stalledView").addEventListener("click", function () {
      FILTER.status = "stalled";
      renderFilters();
      renderTable();
    });
  }

  function render(sessions) {
    SESSIONS = sessions;
    snapshotSessions(sessions);            // baseline for the background "new activity" nudge
    var ub = $("updateBanner"); if (ub) ub.innerHTML = ""; // just loaded, so we're current
    renderStalledBanner(); // Feature 5: recompute across all sessions on every reload
    $("count").textContent = sessions.length + (sessions.length === 1 ? " session" : " sessions");
    if (!sessions.length) {
      $("kpis").hidden = true; $("filters").hidden = true; $("insightsWrap").hidden = true;
      $("body").innerHTML = '<div style="text-align:center;padding:56px 20px;color:var(--muted)">' +
        '<div style="font-size:34px;opacity:.5;margin-bottom:10px">📥</div>' +
        '<div style="font-size:15px;font-weight:700;color:var(--teal);margin-bottom:4px">No onboarding sessions yet</div>' +
        '<div style="font-size:13px;line-height:1.5">Sessions appear here the moment a client sends their brief.</div></div>';
      return;
    }
    renderFilters();
    renderTable(); // renderTable recomputes the KPIs from the filtered list
  }

  // Close from anywhere (button, backdrop, Escape) and hand focus back to where
  // the user was — a Proserv user triages many sessions in a row.
  var lastFocus = null;
  // Monotonic token so a slow fetch for a previously-opened (or since-closed) session
  // can't repaint the modal with the wrong client's brief. Each open captures the
  // current value; a resolve whose token is stale is ignored. Closing bumps it.
  var _openSeq = 0;
  function closeModal() {
    _openSeq++;
    $("modal").classList.remove("show");
    if (lastFocus && lastFocus.focus) { try { lastFocus.focus(); } catch (e) {} }
    lastFocus = null;
  }

  function openSession(id) {
    var myReq = ++_openSeq;
    lastFocus = document.activeElement;
    $("sheet").innerHTML = '<div class="empty">Loading…</div>';
    $("modal").classList.add("show");
    $("sheet").focus();
    authedFetch(SESSION_ENDPOINT + "?id=" + encodeURIComponent(id))
      .then(function (r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
      .then(function (data) { if (myReq !== _openSeq) return; renderSheet(data.session); loadSeedNotes(data.session); })
      .catch(function (e) { if (myReq !== _openSeq) return; $("sheet").innerHTML = '<div class="err">Could not open session (' + esc(e.message) + ').</div>'; });
  }

  // Consultant notes live in the seed store, not the session record, and are
  // returned only to a token-authenticated caller. Fetch them separately.
  function loadSeedNotes(s) {
    if (!s || !s.seedId) return;
    var el = $("seedNotes"); if (!el) return;
    authedFetch(SEED_ENDPOINT + "?id=" + encodeURIComponent(s.seedId))
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (d) {
        var notes = d && d.seed && d.seed.notes;
        el.innerHTML = notes ? '<div style="white-space:pre-wrap">' + esc(notes) + '</div>' : '<div class="muted">No notes.</div>';
      })
      .catch(function () { el.innerHTML = '<div class="muted">Could not load notes.</div>'; });
  }

  function renderSheet(s) {
    var c = (s.merged && s.merged.company) || {};
    var topics = (s.merged && Array.isArray(s.merged.topics)) ? s.merged.topics : [];
    var channels = (s.merged && Array.isArray(s.merged.channels)) ? s.merged.channels : [];
    var users = Array.isArray(s.users) ? s.users : [];
    var html = '<div class="sheethead"><button class="close" id="close">Close</button>' +
      '<h2>' + esc(c.name || "(unnamed)") + '</h2>' +
      '<div class="sub">' + esc(c.contact || "") + (c.email ? " · " + esc(c.email) : "") + '</div>' +
      '<div class="stabs"><button type="button" data-sec="topics">Topics</button><button type="button" data-sec="channels">Channels</button><button type="button" data-sec="users">Users</button></div></div>' +
      '<div class="sheetbody"><div class="kv">' +
        kv("Industry", c.industry) +
        kv("Markets", c.markets) +
        kv("Languages", c.languages) +
        kv("Objectives", c.objectives) +
        kv("Teams", c.teams) +
        kv("Timezone", c.timezone) +
        kv("Time spent", fmtDuration(s.durationMs)) +
        kv("AI calls", s.apiCalls != null ? s.apiCalls : "—") +
        kv("Tokens", s.tokens ? (fmtTokens(totalTokens(s.tokens)) + " — " + num(s.tokens.input) + " in / " + num(s.tokens.output) + " out / " + num(s.tokens.cacheRead) + " cached-read") : "—") +
        kv("Est. cost", s.tokens ? fmtCost(costOf(s.tokens)) : "—") +
        kv("Submitted", fmtDate(s.sentAt)) +
      '</div>';

    if (c.objectiveDetails) html += '<div class="sec">Objective details</div><div class="list"><div>' + esc(c.objectiveDetails) + '</div></div>';

    html += '<div class="sec" id="sec-topics">Topics to track (' + topics.length + ')</div><div class="list">' +
      (topics.length ? topics.map(function (t) {
        return '<div><strong>' + esc(t.name) + '</strong>' + (t.keywords ? ' — ' + esc(t.keywords) : "") + (t.rationale ? ' <span class="muted">(' + esc(t.rationale) + ')</span>' : "") + '</div>';
      }).join("") : '<div class="muted">None</div>') + '</div>';

    html += '<div class="sec" id="sec-channels">Channels (' + channels.length + ')</div><div class="list">' +
      (channels.length ? channels.map(function (ch) {
        return '<div>' + esc(ch.author || ch.url || "") + (ch.type ? ' <span class="muted">' + esc(ch.type) + '</span>' : "") + '</div>';
      }).join("") : '<div class="muted">None</div>') + '</div>';

    html += '<div class="sec" id="sec-users">Users (' + users.length + ')</div><div class="list">' +
      (users.length ? users.map(function (u) {
        return '<div>' + esc((u.firstName || "") + " " + (u.lastName || "")) + ' <span class="muted">' + esc(u.email || "") + (u.role ? " · " + esc(u.role) : "") + '</span></div>';
      }).join("") : '<div class="muted">None</div>') + '</div>';

    if (s.queries && s.queries !== "__skip__") {
      html += '<div class="sec">Migrated queries</div><div class="qbox">' + esc(s.queries) + '</div>';
    }

    var sUrl = safeUrl(s.sheetUrl);
    if (sUrl) html += '<div class="sec">Editable Google Sheet</div><div class="list"><div><a href="' + esc(sUrl) + '" target="_blank" rel="noopener noreferrer">Open the client\'s brief in Google Sheets</a></div></div>';

    var h = s.handoff;
    var handoffText = ""; // Feature 6: plain-text version for the Copy button
    if (h) {
      var hpairs = [["Maturity", h.maturity], ["Goal in their words", h.goalInOwnWords], ["Hesitations", h.hesitations], ["AI-suggested, unconfirmed", h.aiSuggestedUnconfirmed], ["Follow-ups for the review call", h.followUps], ["Tips for the consultant", h.consultantTips]]
        .filter(function (r) { return r[1]; });
      var hrows = hpairs.map(function (r) { return '<div><strong>' + esc(r[0]) + ':</strong> ' + esc(r[1]) + '</div>'; }).join("");
      if (hrows) {
        handoffText = hpairs.map(function (r) { return r[0] + ": " + r[1]; }).join("\n");
        html += '<div class="sec">Consultant handoff <button type="button" id="copyHandoff" class="copybtn">Copy handoff</button></div><div class="list">' + hrows + '</div>';
      }
    }

    if (s.seedId) {
      html += '<div class="sec">Consultant notes (from Sales)</div><div class="list" id="seedNotes"><div class="muted">Loading…</div></div>';
    }

    html += '</div>'; // close .sheetbody
    $("sheet").innerHTML = html;
    $("close").addEventListener("click", closeModal);
    $("close").focus();
    // E4: jump-to-section tabs scroll the modal to Topics / Channels / Users.
    Array.prototype.forEach.call(document.querySelectorAll(".stabs button"), function (b) {
      b.addEventListener("click", function () {
        var el = document.getElementById("sec-" + b.getAttribute("data-sec"));
        if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
      });
    });
    // Feature 6: copy the handoff rows as plain text (only present when there is a handoff).
    var copyBtn = $("copyHandoff");
    if (copyBtn) {
      var copyLabel = copyBtn.textContent;
      copyBtn.addEventListener("click", function () { copyText(handoffText, copyBtn, copyLabel); });
    }
  }

  // Feature 6: copy helper. Prefer the async Clipboard API; fall back to a hidden
  // textarea + execCommand for older or non-secure contexts. Shows a transient
  // "Copied" on the button.
  function copyText(text, btn, label) {
    function done() {
      if (!btn) return;
      btn.textContent = "Copied";
      setTimeout(function () { btn.textContent = label; }, 1500);
    }
    function fallback() {
      try {
        var ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.top = "-1000px";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        done();
      } catch (e) { /* clipboard unavailable */ }
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, fallback);
    } else {
      fallback();
    }
  }

  function kv(k, v) {
    if (!v) return "";
    return '<div class="k">' + esc(k) + '</div><div>' + esc(v) + '</div>';
  }

  $("modal").addEventListener("click", function (e) { if (e.target === $("modal")) closeModal(); });
  document.addEventListener("keydown", function (e) { if (e.key === "Escape" && $("modal").classList.contains("show")) closeModal(); });
  $("refresh").addEventListener("click", load);
  $("insToggle").addEventListener("click", function () {
    var hidden = $("insights").classList.toggle("hidden");
    this.textContent = hidden ? "Show" : "Hide";
    try { localStorage.setItem("dash_insights_hidden", hidden ? "1" : "0"); } catch (e) {}
  });
  // Restore the collapsed choice across reloads (defaults to shown). renderInsights
  // never touches the .hidden class, so setting it once here sticks.
  try {
    if (localStorage.getItem("dash_insights_hidden") === "1") {
      $("insights").classList.add("hidden");
      $("insToggle").textContent = "Show";
    }
  } catch (e) {}

  // Click (or Enter/Space) a breakdown bar to filter the whole dashboard to that
  // package / language / consultant; clicking the active one clears it. Delegated on
  // #insights, which persists across chart re-renders.
  function applyChartFilter(fk, fv) {
    if (!fk) return;
    FILTER[fk] = (String(FILTER[fk]) === String(fv)) ? "all" : fv;
    renderFilters();
    renderTable();
  }
  function chartRowFrom(e) { return (e.target && e.target.closest) ? e.target.closest(".barrow-click") : null; }
  $("insights").addEventListener("click", function (e) {
    var row = chartRowFrom(e);
    if (row) applyChartFilter(row.getAttribute("data-fk"), row.getAttribute("data-fv"));
  });
  $("insights").addEventListener("keydown", function (e) {
    if (e.key !== "Enter" && e.key !== " " && e.key !== "Spacebar") return;
    var row = chartRowFrom(e);
    if (row) { e.preventDefault(); applyChartFilter(row.getAttribute("data-fk"), row.getAttribute("data-fv")); }
  });
  load();
  setInterval(pollUpdates, UPDATE_POLL_MS); // background check for new activity
</script>
</body>
</html>
