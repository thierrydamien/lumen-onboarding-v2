<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='16' fill='%237E48EC'/%3E%3Cg stroke='%23ffffff' stroke-width='2.6' stroke-linecap='round'%3E%3Cline x1='6' y1='12' x2='6' y2='20'/%3E%3Cline x1='11' y1='8.5' x2='11' y2='23.5'/%3E%3Cline x1='16' y1='5.5' x2='16' y2='26.5'/%3E%3Cline x1='21' y1='8.5' x2='21' y2='23.5'/%3E%3Cline x1='26' y1='12' x2='26' y2='20'/%3E%3C/g%3E%3C/svg%3E"/>
<!-- Preload Inter before the JS bundle parses so the client never sees the Arial
     fallback flash-then-reflow. display=swap keeps text visible while it loads. -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"/>
<title>Lumen Onboarding</title>
<style>
  #boot{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:#fff;font-family:'Inter',Arial,sans-serif}
  #boot .orb{width:64px;height:64px;border-radius:18px;background:#7E48EC;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(126,72,236,.25)}
  #boot .lbl{color:#64748b;font-size:13px;animation:bootpulse 1.4s ease-in-out infinite}
  @keyframes bootpulse{0%,100%{opacity:.55}50%{opacity:1}}
  @media (prefers-reduced-motion: reduce){#boot .lbl{animation:none}}
</style>
</head>
<body style="margin:0">
<!-- Splash lives inside #root; React replaces it on first commit, so there is no
     blank-white beat while the bundle loads on a slow client connection. -->
<div id="root"><div id="boot"><div class="orb"><svg width="38" height="38" viewBox="0 0 32 32" fill="none"><g stroke="#fff" stroke-width="2.6" stroke-linecap="round"><line x1="6" y1="12" x2="6" y2="20"/><line x1="11" y1="8.5" x2="11" y2="23.5"/><line x1="16" y1="5.5" x2="16" y2="26.5"/><line x1="21" y1="8.5" x2="21" y2="23.5"/><line x1="26" y1="12" x2="26" y2="20"/></g></svg></div><div class="lbl">Loading your session…</div></div></div>
<script type="module" src="/chat-main.js"></script>
</body>
</html>
